    payload:
      name: Скрытые данные (Payload)
      required: false
      selector:
        text: {}
    inline_keyboard:
      name: "Инлайн-клавиатура / Меню (клавиатура)"
      default: true
      selector:
        boolean: {}
    auto_answer_callback:
      name: Автоматически гасить кружок
