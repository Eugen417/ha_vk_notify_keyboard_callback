      domain: notify
  fields:
    conversation_message_id:
      name: Идентификатор сообщения (cmid)
      required: true
      selector:
        text: {}

unpin_message:
  name: "Открепить сообщение"
  description: "Открепляет сообщение в шапке беседы. Если ID не передан, открепит текущее закрепленное."
  target:
    entity:
      integration: vk_notify
      domain: notify
  fields:
    conversation_message_id:
      name: Идентификатор сообщения (cmid)
      required: false
      selector:
        text: {}

answer_callback:
  name: "Ответить на нажатие (Снэкбар)"
  description: "Останавливает загрузку на кнопке и (опционально) показывает всплывающее уведомление (снэкбар) в приложении ВК."
  target:
    entity:
      integration: vk_notify
      domain: notify
  fields:
    event_id:
      name: Event ID
      description: "Идентификатор события (из trigger.event.data.event_id)."
      required: true
      selector:
        text: {}
    user_id:
      name: User ID
      description: "VK ID пользователя, нажавшего кнопку (из trigger.event.data.user_id)."
      required: true
      selector:
        text: {}
    message:
      name: Текст (Снэкбар)
      description: "Текст уведомления (максимум 90 символов). Если оставить пустым, кнопка просто перестанет крутиться."
      required: false
      selector:
        text: {}