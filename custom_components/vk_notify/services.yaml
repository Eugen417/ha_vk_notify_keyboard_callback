# VK Notify services.yaml v1.5.2 (Terminology & Full UI Descriptions Update)
send_message:
  name: "Отправить сообщение"
  description: Отправляет текстовое уведомление, медиа, координаты или карусель.
  target:
    entity:
      integration: vk_notify
      domain: notify
  fields:
    title:
      name: Заголовок
      description: Необязательный заголовок. Будет добавлен первой строкой с двойным отступом перед сообщением.
      required: false
      selector:
        text: {}
    message:
      name: Сообщение
      description: "Основной текст уведомления. Поддерживает эмодзи и перенос строк."
      required: true
      selector:
        text:
          multiline: true
    parse_mode:
      name: Режим разбора
      description: "Парсер текста сообщения. Выберите «Обычный текст», чтобы отправить текст «как есть» без преобразования тегов."
      default: html
      selector:
        select:
          mode: list
          options:
            - label: "HTML"
              value: html
            - label: "Markdown (Устаревший)"
              value: markdown
            - label: "MarkdownV2"
              value: markdownv2
            - label: "Обычный текст"
              value: plain
    attachment:
      name: Вложение (Медиа)
      description: "Готовая строка медиафайла из ВК, например: photo123_456 или doc-789_012."
      required: false
      selector:
        text: {}
    disable_mentions:
      name: Без звука для упоминаний
      description: "Отключает только специфический пуш об упоминании (@id)."
      required: false
      default: false
      selector:
        boolean: {}
    inline_keyboard:
      name: "Инлайн-клавиатура / Меню (клавиатура)"
      description: >
        ВКЛ Инлайн-клавиатура: Кнопки «встроены» прямо в само сообщение (в тот же пузырь, где текст). 
        Они «тихие», потому что позволяют использовать тип callback, который не спамит текстом в чат. 
        При прокрутке истории такие кнопки уезжают вверх вместе с сообщением.
        ВЫКЛ Меню (Обычная клавиатура): Это те самые кнопки, которые заменяют собой стандартную клавиатуру 
        телефона в нижней части экрана. Они «висят» внизу, пока ты их не удалишь или не заменишь на другие, 
        независимо от того, как далеко ты прокрутил чат.
      required: false
      default: true
      selector:
        boolean: {}
    auto_answer_callback:
      name: Автоматически гасить кружок (Spinner)
      description: "ВКЛ (Рекомендуется): Интеграция сама мгновенно остановит загрузку на кнопке. ВЫКЛ: Кружок будет висеть, пока вы не ответите службой 'answer_callback' в автоматизации (нужно для Снэкбаров)."
      required: false
      default: true
      selector:
        boolean: {}
    keyboard:
      name: Клавиатура
      description: "JSON-объект с кнопками (inline или обычными)."
      required: false
      selector:
        object: {}
    template:
      name: Шаблон / Карусель (Template)
      description: "JSON-объект карусели. По требованиям VK API должен содержать параметр 'type': 'carousel' и массив карточек 'elements'."
      required: false
      selector:
        object: {}
    payload:
      name: Скрытые данные (Payload)
      description: "Невидимая строка данных, которая вернется боту при ответе или пересылке."
      required: false
      selector:
        text: {}
    lat:
      name: Широта (Latitude)
      description: Координата широты для отправки геолокации.
      required: false
      selector:
        text: {}
    long:
      name: Долгота (Longitude)
      description: Координата долготы для отправки геолокации.
      required: false
      selector:
        text: {}
    reply_to:
      name: Ответить на сообщение
      description: Идентификатор сообщения (cmid) в беседе, на которое нужно ответить.
      required: false
      selector:
        text: {}

