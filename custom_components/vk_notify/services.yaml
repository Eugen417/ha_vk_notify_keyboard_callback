send_message:
  name: "Отправить сообщение"
  description: Отправляет текстовое уведомление, координаты или карусель.
  fields:
    message:
      name: Сообщение
      description: Текст сообщения.
      required: true
      selector:
        text:
          multiline: true
    title:
      name: Заголовок
      description: Добавляется первой строкой перед сообщением.
      required: false
      selector:
        text:
    keyboard:
      name: Клавиатура
      description: JSON-объект с кнопками (inline или обычными).
      required: false
      selector:
        object:
    lat:
      name: Широта (Latitude)
      description: Координата для нативной карты (например, 55.751244).
      required: false
      selector:
        text:
    long:
      name: Долгота (Longitude)
      description: Координата для нативной карты (например, 37.618423).
      required: false
      selector:
        text:
    reply_to:
      name: ID сообщения для ответа
      description: Бот ответит на это сообщение (укажите cmid).
      required: false
      selector:
        number:
          mode: box

send_photo:
  name: "Отправить фото"
  description: Отправляет фото через VK.
  fields:
    message:
      name: Подпись к фото
      required: false
      selector:
        text:
    file:
      name: Локальный путь к файлу
      description: Например, /config/www/image.jpg
      required: false
      selector:
        text:
    url:
      name: URL картинки
      description: Ссылка на картинку в интернете.
      required: false
      selector:
        text:
    reply_to:
      name: ID сообщения для ответа
      required: false
      selector:
        number:
          mode: box

send_file:
  name: "Отправить файл"
  description: Отправить файл через VK.
  fields:
    file:
      name: Локальный путь к файлу
      required: true
      selector:
        text:
    message:
      name: Подпись к файлу
      required: false
      selector:
        text:
    reply_to:
      name: ID сообщения для ответа
      required: false
      selector:
        number:
          mode: box

send_voice:
  name: "Отправить голосовое сообщение"
  description: Отправляет аудиофайл (.ogg) как голосовое сообщение.
  fields:
    file:
      name: Локальный путь к аудиофайлу
      required: true
      selector:
        text:
    message:
      name: Подпись к аудио
      required: false
      selector:
        text:

wall_post:
  name: "Опубликовать на стене"
  description: Отправляет запись на стену.
  fields:
    message:
      name: Текст поста
      required: false
      selector:
        text:
          multiline: true
    file:
      name: Локальный путь к фото
      required: false
      selector:
        text:

edit_message:
  name: "Редактировать сообщение"
  description: Изменяет текст и клавиатуру ранее отправленного сообщения.
  fields:
    message:
      name: Новый текст сообщения
      required: true
      selector:
        text:
          multiline: true
    message_id:
      name: ID сообщения (В личке)
      required: false
      selector:
        number:
          mode: box
    conversation_message_id:
      name: ID сообщения (В беседе)
      required: false
      selector:
        number:
          mode: box
    keyboard:
      name: Новая клавиатура
      required: false
      selector:
        object:
    attachment:
      name: Новое вложение
      required: false
      selector:
        text:

delete_message:
  name: "Удалить сообщение"
  description: Удаляет сообщение у всех участников чата.
  fields:
    conversation_message_id:
      name: ID сообщения (cmid)
      required: true
      selector:
        number:
          mode: box

send_sticker:
  name: "Отправить стикер"
  description: Отправляет стикер ВКонтакте по его номеру.
  fields:
    sticker_id:
      name: ID Стикера
      description: Порядковый номер стикера (например, 3 - собака Спотти).
      required: true
      example: 3
      selector:
        number:
          min: 1
          mode: box
    reply_to:
      name: ID сообщения для ответа
      required: false
      selector:
        number:
          mode: box

edit_chat:
  name: "Изменить название беседы"
  description: Меняет заголовок группового чата (Бот должен быть админом!).
  fields:
    title:
      name: Новое название
      description: Поддерживает эмодзи.
      required: true
      example: "🔴 ОХРАНА | Дом 190"
      selector:
        text:

get_user_info:
  name: "Получить инфо о пользователе"
  description: Пробивает юзера. Возвращает Имя, Фамилию и статус Онлайн.
  fields:
    user_id:
      name: VK ID пользователя
      description: Цифровой ID (или from_id из события).
      required: true
      example: "123456789"
      selector:
        text:

set_activity:
  name: "Статус активности"
  description: Показывает в чате, что бот печатает или записывает голосовое.
  fields:
    type:
      name: Тип активности
      required: true
      selector:
        select:
          options:
            - label: "Печатает текст..."
              value: "typing"
            - label: "Записывает голосовое..."
              value: "audiomsg"

send_reaction:
  name: "Отправить реакцию (Лайк)"
  description: Ставит эмодзи-реакцию на конкретное сообщение.
  fields:
    conversation_message_id:
      name: ID сообщения (cmid)
      description: На какое сообщение ставим реакцию?
      required: true
      selector:
        number:
          mode: box
    reaction_id:
      name: Реакция
      description: Выберите эмоцию.
      required: true
      selector:
        select:
          options:
            - label: "👍 Палец вверх (1)"
              value: 1
            - label: "👎 Палец вниз (2)"
              value: 2
            - label: "❤ Сердце (3)"
              value: 3
            - label: "🔥 Огонь (4)"
              value: 4

pin_message:
  name: "Закрепить сообщение"
  description: Закрепляет сообщение в шапке беседы.
  fields:
    conversation_message_id:
      name: ID сообщения (cmid)
      required: true
      selector:
        number:
          mode: box
