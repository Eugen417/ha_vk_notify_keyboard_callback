send_message:
  name: "Отправить сообщение"
  description: "Отправляет текстовое уведомление и возвращает его идентификаторы."
  response:
    optional: true
  fields:
    entity_id:
      name: "Цель уведомления"
      description: "Выберите сущность ВК."
      required: true
      selector:
        entity:
          integration: vk_notify
          domain: notify
    message:
      name: "Сообщение"
      description: "Основной текст уведомления."
      required: true
      selector:
        text:
          multiline: true
    title:
      name: "Заголовок"
      description: "Заголовок сообщения."
      selector:
        text:
    keyboard:
      name: "Клавиатура"
      description: "Объект клавиатуры в формате JSON."
      selector:
        object: {}

send_photo:
  name: "Отправить фото"
  description: "Отправляет изображение по ссылке или локальному пути."
  response:
    optional: true
  fields:
    entity_id:
      name: "Цель уведомления"
      required: true
      selector:
        entity:
          integration: vk_notify
          domain: notify
    url:
      name: "URL изображения"
      description: "Прямая ссылка на фото в сети."
      selector:
        text:
    file:
      name: "Путь к файлу"
      description: "Локальный путь к файлу на сервере HA."
      selector:
        text:
    message:
      name: "Подпись"
      description: "Текст под фотографией."
      selector:
        text:
          multiline: true
    keyboard:
      name: "Клавиатура"
      selector:
        object: {}

