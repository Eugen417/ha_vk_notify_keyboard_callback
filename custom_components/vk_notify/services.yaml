  description: Меняет заголовок группового чата (Для этого бот должен быть администратором).
  target:
    entity:
      integration: vk_notify
      domain: notify
  fields:
    title:
      name: Новое название
      description: Поддерживает эмодзи.
      required: true
      selector:
        text: {}

get_user_info:
  name: "Получить инфо о пользователе"
  description: Запрашивает данные пользователя. Возвращает Имя, Фамилию и статус Онлайн.
  target:
    entity:
      integration: vk_notify
      domain: notify
  fields:
    user_id:
      name: VK ID пользователя
      description: Цифровой ID пользователя (или from_id из события).
      required: true
      selector:
        text: {}

set_activity:
  name: "Статус активности"
  description: Показывает в чате, что бот печатает или записывает голосовое сообщение.
  target:
    entity:
      integration: vk_notify
      domain: notify
  fields:
    type:
      name: Тип активности
      required: true
      selector:
        select:
          options:
            - label: "Печатает текст..."
              value: "typing"
            - label: "Записывает голосовое..."
              value: "audiomsg"

send_reaction:
  name: "Отправить реакцию (Лайк)"
  description: Устанавливает эмодзи-реакцию на конкретное сообщение.
  target:
    entity:
      integration: vk_notify
      domain: notify
  fields:
    conversation_message_id:
      name: Идентификатор сообщения (cmid)
      description: На какое сообщение поставить реакцию?
      required: true
      selector:
        select:
          options:
            - label: "👍 Палец вверх (1)"
              value: "1"
            - label: "👎 Палец вниз (2)"
              value: "2"
            - label: "❤ Сердце (3)"
              value: "3"
            - label: "🔥 Огонь (4)"
              value: "4"

