edit_message:
  name: "Редактировать сообщение"
  description: Изменяет текст, клавиатуру и вложения ранее отправленного сообщения.
  target:
    entity:
      integration: vk_notify
      domain: notify
  fields:
    message:
      name: Новый текст сообщения
      required: true
      selector:
        text:
          multiline: true
    parse_mode:
      name: Режим разбора
      description: "Парсер текста сообщения."
      default: html
      selector:
        select:
          mode: list
          options:
            - label: "HTML"
              value: html
            - label: "Markdown (Устаревший)"
              value: markdown
            - label: "MarkdownV2"
              value: markdownv2
            - label: "Обычный текст"
              value: plain
    message_id:
      name: Идентификатор сообщения (В личных сообщениях)
      required: false
      selector:
        text: {}
    conversation_message_id:
      name: Идентификатор сообщения (В беседе)
      required: false
      selector:
        text: {}
    attachment:
      name: Новое вложение
      description: Строка медиа (photo123_456). Передайте пустую строку для удаления вложения.
      required: false
      selector:
        text: {}
    keyboard:
      name: Новая клавиатура
      required: false
      selector:
        object: {}
    disable_mentions:
      name: Без звука для упоминаний
      required: false
      selector:
        boolean: {}

